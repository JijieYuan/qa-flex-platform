server:
  port: 0

spring:
  main:
    banner-mode: off
  datasource:
    url: ${TEST_DATASOURCE_URL:jdbc:postgresql://localhost:15433/qaflex?currentSchema=qaflex_test}
    username: ${TEST_DATASOURCE_USERNAME:qaflex}
    password: ${TEST_DATASOURCE_PASSWORD:change_this_password}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:test-schema-init.sql,classpath:schema.sql
  flyway:
    enabled: false

mybatis-plus:
  global-config:
    banner: false

logging:
  level:
    root: warn
    com.data.collection.platform: warn
    org.springframework: warn
    org.flywaydb: warn
    com.zaxxer.hikari: warn

platform:
  auth:
    admin-username: ${TEST_PLATFORM_ADMIN_USERNAME:admin}
    admin-password: ${TEST_PLATFORM_ADMIN_PASSWORD:admin-test-2026}
    approval-username: ${TEST_PLATFORM_APPROVAL_USERNAME:approval}
    approval-password: ${TEST_PLATFORM_APPROVAL_PASSWORD:approval-test-2026}
  gitlab-mirror:
    scheduler-enabled: false
    web-base-url: ${TEST_GITLAB_WEB_BASE_URL:http://gitlab.test.local:18080}
