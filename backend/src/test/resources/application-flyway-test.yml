server:
  port: 0

spring:
  main:
    banner-mode: off
  datasource:
    url: ${TEST_DATASOURCE_URL:jdbc:postgresql://localhost:15433/qaflex?currentSchema=qaflex_test_flyway}
    username: ${TEST_DATASOURCE_USERNAME:qaflex}
    password: ${TEST_DATASOURCE_PASSWORD:change_this_password}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: qaflex_test_flyway
    default-schema: qaflex_test_flyway
    create-schemas: true
    baseline-on-migrate: true

mybatis-plus:
  global-config:
    banner: false

logging:
  level:
    root: warn
    com.data.collection.platform: warn
    org.springframework: warn
    org.flywaydb: warn
    com.zaxxer.hikari: warn

platform:
  gitlab-mirror:
    scheduler-enabled: false
