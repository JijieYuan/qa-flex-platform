server:
  port: 18080

spring:
  application:
    name: data-collection-platform-backend
  jackson:
    time-zone: ${PLATFORM_TIME_ZONE:Asia/Shanghai}
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:15432/qaflex}
    username: ${DATASOURCE_USERNAME:qaflex}
    password: ${DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:never}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
  jdbc:
    template:
      query-timeout: ${PLATFORM_QUERY_TIMEOUT_SECONDS:30}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    path: logs

platform:
  auth:
    provider: ${PLATFORM_AUTH_PROVIDER:local}
    admin-username: ${PLATFORM_ADMIN_USERNAME:admin}
    admin-password: ${PLATFORM_ADMIN_PASSWORD:admin123}
    approval-username: ${PLATFORM_APPROVAL_USERNAME:approval}
    approval-password: ${PLATFORM_APPROVAL_PASSWORD:approval}
    secure-config-required: ${PLATFORM_SECURE_CONFIG_REQUIRED:true}
    csrf-enabled: ${PLATFORM_AUTH_CSRF_ENABLED:true}
    ldap:
      url: ${PLATFORM_LDAP_URL:}
      base-dn: ${PLATFORM_LDAP_BASE_DN:}
      user-search-base: ${PLATFORM_LDAP_USER_SEARCH_BASE:}
      user-search-filter: ${PLATFORM_LDAP_USER_SEARCH_FILTER:}
      manager-dn: ${PLATFORM_LDAP_MANAGER_DN:}
      manager-password: ${PLATFORM_LDAP_MANAGER_PASSWORD:}
      group-search-base: ${PLATFORM_LDAP_GROUP_SEARCH_BASE:}
      group-search-filter: ${PLATFORM_LDAP_GROUP_SEARCH_FILTER:}
      group-role-mappings: {}
  gitlab-mirror:
    scheduler-enabled: true
    scheduler-delay-ms: 60000
    run-dispatcher-delay-ms: 2000
    # 本地/内网 GitLab 访问地址，记录类页面和代码走查链接统一复用这里
    web-base-url: ${GITLAB_WEB_BASE_URL:http://localhost}
    system-hook-base-url: ${GITLAB_SYSTEM_HOOK_BASE_URL:http://host.docker.internal:18080/api/gitlab-sync/system-hook}
    docker-command: ${DOCKER_COMMAND:docker}
    heartbeat-timeout-seconds: 180
    dedupe-window-seconds: 15
    failure-backoff-minutes: 10
    schema-check-interval-minutes: 720
    system-hook-status-cache-seconds: 60
    system-hook-batch-window-seconds: 3
    system-hook-batch-size: 10
    system-hook-max-queue-size: ${GITLAB_SYSTEM_HOOK_MAX_QUEUE_SIZE:1000}
    external-query-timeout-seconds: 120
    external-query-retry-attempts: 3
    external-query-retry-delay-ms: 1000
    external-query-retry-max-delay-ms: ${GITLAB_EXTERNAL_QUERY_RETRY_MAX_DELAY_MS:30000}
    incremental-lookback-minutes: 5
    max-sync-threads: ${GITLAB_MAX_SYNC_THREADS:16}
  review-data:
    search-index-backfill-enabled: ${REVIEW_DATA_SEARCH_INDEX_BACKFILL_ENABLED:false}
    search-index-backfill-delay-ms: ${REVIEW_DATA_SEARCH_INDEX_BACKFILL_DELAY_MS:300000}
  fact-build:
    guard-timeout-ms: ${FACT_BUILD_GUARD_TIMEOUT_MS:7200000}
    search-index-backfill-batch-size: ${REVIEW_DATA_SEARCH_INDEX_BACKFILL_BATCH_SIZE:200}
  query:
    slow-threshold-ms: ${PLATFORM_SLOW_QUERY_THRESHOLD_MS:1000}
