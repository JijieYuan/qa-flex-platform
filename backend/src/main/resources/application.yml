server:
  port: 18080

spring:
  application:
    name: data-collection-platform-backend
  datasource:
    url: jdbc:postgresql://localhost:15432/qaflex
    username: qaflex
    password: qaflex_dev_2026
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    path: logs

platform:
  gitlab-mirror:
    scheduler-enabled: true
    scheduler-delay-ms: 60000
    webhook-base-url: http://localhost:18080/api/gitlab-sync/webhook
    docker-command: docker
    heartbeat-timeout-seconds: 180
    dedupe-window-seconds: 15
    failure-backoff-minutes: 10
    schema-check-interval-minutes: 720
